# CI/CD do Matraca:
#  - push/PR: compila e gera o instalador como artefato do run (validacao)
#  - tag v* (ex.: v1.0.0): gera o instalador e publica um GitHub Release com ele
# Como lancar uma versao:  git tag v1.2.3 && git push --tags
name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: write # criar o release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Definir versao (tag v1.2.3 -> 1.2.3; senao 0.0.0-ci)
        id: ver
        shell: pwsh
        run: |
          $v = if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $env:GITHUB_REF -replace '^refs/tags/v', ''
          } else { '0.0.0' }
          "version=$v" >> $env:GITHUB_OUTPUT

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Gerar instalador
        shell: pwsh
        run: ./installer/build-installer.ps1 -Version ${{ steps.ver.outputs.version }}

      - name: Artefato de CI (pushes sem tag)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: matraca-setup-ci
          path: installer/output/*.exe

      - name: Publicar release (tag)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: installer/output/*.exe
          generate_release_notes: true
